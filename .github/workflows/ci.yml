name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bcms
          POSTGRES_USER: bcms_user
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bcms_user -d bcms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: bcms
          RABBITMQ_DEFAULT_PASS: changeme_mq
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bcms_user:changeme@localhost:5432/bcms
      RABBITMQ_URL: amqp://bcms:changeme_mq@localhost:5672
      NODE_ENV: development
      # ORTA-CFG-5.1.1 (2026-05-04): SKIP_AUTH=true smoke test için zorunlu.
      # validateRuntimeEnv() prod'da blok ediyor (NODE_ENV=production iken
      # boot abort); CI NODE_ENV=development olduğu için bu env kabul edilir.
      # Asla production deployment env'ine kopyalanmamalı.
      SKIP_AUTH: "true"
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: bcms
      KEYCLOAK_CLIENT_ID: bcms-api
      KEYCLOAK_ALLOWED_CLIENTS: bcms-web,bcms-api
      KEYCLOAK_ADMIN_PASSWORD: changeme_kc
      INGEST_CALLBACK_SECRET: ci-ingest-secret
      BCMS_BACKGROUND_SERVICES: none
      WATCH_FOLDER: ./tmp/watch
      OPTA_DIR: ./tmp/opta
      BCMS_API_URL: http://127.0.0.1:3000/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # ORTA-CFG-5.1.2 fix (2026-05-04): --omit=dev — devDependencies CVE'leri
        # üretimi etkilemez ama pipeline'ı kırarak gürültü yapıyor. Sadece prod
        # deps üzerinde audit, devDeps için periyodik manuel inceleme tercih.
        run: npm audit --omit=dev --audit-level=high

      - name: Generate Prisma client
        run: |
          rm -rf node_modules/.prisma node_modules/@prisma/client node_modules/prisma
          npm install prisma@5.22.0 @prisma/client@5.22.0
          npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Apply Database Migrations (Standard Prisma)
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Run Tests (Unit & Integration)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Start API
        run: |
          mkdir -p tmp/watch tmp/opta
          node apps/api/dist/server.js > /tmp/bcms-api.log 2>&1 &
          echo $! > /tmp/bcms-api.pid

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/bcms-api.log
          exit 1

      - name: API smoke tests
        run: npm run smoke:api

      - name: API logs on failure
        if: failure()
        run: cat /tmp/bcms-api.log || true

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/bcms-api.pid ]; then
            kill "$(cat /tmp/bcms-api.pid)" || true
          fi
