# HIGH-INF-002 fix (2026-05-05): Docker log rotation — disk dolma koruması.
# Tüm servisler json-file driver + 100MB × 3 file = max 300MB log/container.
# Container ekleyince `logging: *default-logging` ekle.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bcms_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB},${KEYCLOAK_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bcms_net

  # ── PostgreSQL Backup Sidecar ────────────────────────────────────────────────
  # Daily pg_dump for both bcms and keycloak databases.
  # Retention: 7 daily + 4 weekly + 6 monthly. Output: gzipped SQL.
  # Restore runbook: infra/postgres/RESTORE.md
  postgres_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: bcms_postgres_backup
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB},${KEYCLOAK_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--clean --if-exists --quote-all-identifiers"
      SCHEDULE: "0 3 * * *"      # 03:00 daily (host TZ)
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: Europe/Istanbul
      # MED-INF-002 fix (2026-05-05): image v0.0.11 plain SQL üretiyor ama
      # default suffix .sql.gz; sahte gzip uzantı RESTORE.md'yi yanıltıyordu.
      # Suffix'i gerçek format ile eşleştir (.sql plain).
      BACKUP_SUFFIX: ".sql"
    volumes:
      - ./infra/postgres/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bcms_net

  # ── RabbitMQ 3.12 ────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: bcms_rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - bcms_net

  # ── Keycloak 23 ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: bcms_keycloak
    restart: unless-stopped
    logging: *default-logging
    command: start --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Reverse proxy (nginx) arkasında çalışıyor; TLS termination edge'de.
      # Iç Docker network'ünde HTTP (izole), dış erişim sadece nginx üzerinden HTTPS.
      KC_PROXY: edge
      # ORTA-INF-4.1.7 (2026-05-04): production'da bu iki env hard-coded
      # `true` olmalı. Default'ları true yapsalar da operatörün yanlışlıkla
      # `KC_HOSTNAME_STRICT_HTTPS=false` set etmesi insecure cookie üretir;
      # security review checklist'ine ekle.
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-true}
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-true}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-beinport}
      # -1 → port issuer URL'ye eklenmez (443 standart HTTPS port'u)
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:--1}
      KC_HTTP_RELATIVE_PATH: "/"
      # Theme cache — DEV default'ları (CSS hot-reload). Theme'e edit yapıp
      # görmek için: `docker compose restart keycloak` + browser hard refresh
      # (Ctrl+Shift+R). PRODUCTION'da .env'de override:
      #   KC_SPI_THEME_STATIC_MAX_AGE=31536000
      #   KC_SPI_THEME_CACHE_THEMES=true
      #   KC_SPI_THEME_CACHE_TEMPLATES=true
      # Bkz: O19 (2026-05-29) — ops/REQUIREMENTS-KEYCLOAK-THEME-DEV.md
      KC_SPI_THEME_STATIC_MAX_AGE: ${KC_SPI_THEME_STATIC_MAX_AGE:--1}
      KC_SPI_THEME_CACHE_THEMES: ${KC_SPI_THEME_CACHE_THEMES:-false}
      KC_SPI_THEME_CACHE_TEMPLATES: ${KC_SPI_THEME_CACHE_TEMPLATES:-false}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      # Custom theme — sadece beinport subdir mount edilir (built-in themes overshadow olmasın).
      - ./infra/keycloak/themes/beinport:/opt/keycloak/themes/beinport:ro
    # Ports kaldırıldı (audit CRIT-001): Keycloak dış ağa bind edilmez.
    # Erişim sadece nginx reverse proxy üzerinden /realms/, /admin/, /resources/ path'leriyle.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bcms_net

  # ── API (Fastify — sadece HTTP istekleri, worker'sız) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    container_name: bcms_api
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # FA1 (2026-05-29): Prisma pool — API 30, Worker 20 (250 user scale).
      PRISMA_CONNECTION_LIMIT_API:    ${PRISMA_CONNECTION_LIMIT_API:-10}
      PRISMA_CONNECTION_LIMIT_WORKER: ${PRISMA_CONNECTION_LIMIT_WORKER:-5}
      PRISMA_POOL_TIMEOUT:            ${PRISMA_POOL_TIMEOUT:-5}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://beinport/realms/bcms}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-https://beinport/realms/bcms,http://localhost:8080/realms/bcms}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-bcms-web,bcms-api}
      INGEST_CALLBACK_SECRET: ${INGEST_CALLBACK_SECRET}
      INGEST_ALLOWED_ROOTS: ${INGEST_ALLOWED_ROOTS:-/opta,/app/tmp/watch}
      OPTA_SYNC_SECRET: ${OPTA_WATCHER_API_TOKEN}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # SSDB MAM resolver — feature flag default OFF; .env içine
      # `PROVYS_SSDB_RESOLVER=on` + `SSDB_*` set edildiğinde aktive olur.
      # API tarafı /api/v1/ssdb/health + /cache/refresh için flag'i okur.
      PROVYS_SSDB_RESOLVER: ${PROVYS_SSDB_RESOLVER:-off}
      SSDB_HOST:     ${SSDB_HOST:-}
      SSDB_PORT:     ${SSDB_PORT:-}
      SSDB_DATABASE: ${SSDB_DATABASE:-}
      SSDB_USER:     ${SSDB_USER:-}
      SSDB_PASSWORD: ${SSDB_PASSWORD:-}
      # Concurrency limit'leri — clamp [1,10]; invalid/empty -> default.
      # lookup: SSDB query fan-out (resolver Tier 1/2/3 + MEDIA_LINK).
      # cache_write: Prisma upsert (P2024 onlem; worker icindeki 9 background
      # service ortak pool'u paylasiyor, audit ext per-write ek query yapar).
      SSDB_LOOKUP_CONCURRENCY:      ${SSDB_LOOKUP_CONCURRENCY:-5}
      SSDB_CACHE_WRITE_CONCURRENCY: ${SSDB_CACHE_WRITE_CONCURRENCY:-5}
      # SSDB resolver worker tuning (2026-05-28 deneme seti — env override; default=kod default'u).
      SSDB_WORKER_INTERVAL_MS:       ${SSDB_WORKER_INTERVAL_MS:-3600000}
      SSDB_WINDOW_FUTURE_DAYS:       ${SSDB_WINDOW_FUTURE_DAYS:-14}
      SSDB_WORKER_MAX_PER_TICK:      ${SSDB_WORKER_MAX_PER_TICK:-100}
      SSDB_BATCH_SIZE:               ${SSDB_BATCH_SIZE:-5}
      SSDB_TTL_FOUND_MIN:            ${SSDB_TTL_FOUND_MIN:-60}
      SSDB_TTL_DURATION_UNKNOWN_MIN: ${SSDB_TTL_DURATION_UNKNOWN_MIN:-120}
      SSDB_TTL_MISSING_MIN:          ${SSDB_TTL_MISSING_MIN:-30}
      SSDB_TTL_ERROR_MIN:            ${SSDB_TTL_ERROR_MIN:-5}
      # Restore + Transfer V2 — API tarafı yalnız route layer (worker container'da
      # çalışır; BCMS_BACKGROUND_SERVICES=none API'de). Env'ler config loader için
      # erişilebilir olmalı (mock factory + route handler şu an env okumuyor ama
      # ileride health endpoint için tutarlı). Mock mode default ON.
      RESTORE_AVID_ENABLED:    ${RESTORE_AVID_ENABLED:-off}
      RESTORE_AVID_MOCK:       ${RESTORE_AVID_MOCK:-true}
      AVID_INTERPLAY_URL:      ${AVID_INTERPLAY_URL:-}
      AVID_USER:               ${AVID_USER:-}
      AVID_PASSWORD:           ${AVID_PASSWORD:-}
      AVID_WORKSPACE:          ${AVID_WORKSPACE:-}
      # K3 transfer — Cloud UX / CTMS submitSTPJob (gerçek yol).
      AVID_CLOUDUX_URL:        ${AVID_CLOUDUX_URL:-}
      AVID_CLOUDUX_REALM:      ${AVID_CLOUDUX_REALM:-}
      AVID_CLOUDUX_TOKEN:      ${AVID_CLOUDUX_TOKEN:-}
      # ROPC self-healing token (no_refresh_token=true → re-login). TOKEN boşsa bunlar şart.
      AVID_CLOUDUX_USER:         ${AVID_CLOUDUX_USER:-}
      AVID_CLOUDUX_PASSWORD:     ${AVID_CLOUDUX_PASSWORD:-}
      AVID_CLOUDUX_CLIENT_BASIC: ${AVID_CLOUDUX_CLIENT_BASIC:-}
      # Capture Web Service (Faz 0 — SALT-OKUMA; default KAPALI; DB satırı env'i override eder)
      CAPTURE_WS_URL:            ${CAPTURE_WS_URL:-}
      CAPTURE_WS_ENABLED:        ${CAPTURE_WS_ENABLED:-false}
      CAPTURE_WS_TIMEOUT_MS:     ${CAPTURE_WS_TIMEOUT_MS:-10000}
      AVID_STP_DEVICE:         ${AVID_STP_DEVICE:-MCR}
      AVID_STP_PROFILE:        ${AVID_STP_PROFILE:-MCR}
      AVID_CLOUDUX_INSECURE_TLS: ${AVID_CLOUDUX_INSECURE_TLS:-true}
      # Watcher bilgi kartı (Ayarlar > Bağlantılar) — BXF/Provys + ASRUN izleyici
      # config'i API tarafında salt-okunur gösterilir; worker ile AYNI .env
      # değerleri (efektif config tutarlı). Canlı durum worker'dan proxy'lenir.
      PROVYS_WATCH_FOLDER:          /app/tmp/provys
      PROVYS_WATCHER_USE_POLLING:   ${PROVYS_WATCHER_USE_POLLING:-false}
      PROVYS_WATCHER_POLL_INTERVAL_MS: ${PROVYS_WATCHER_POLL_INTERVAL_MS:-30000}
      PROVYS_WATCHER_DEBOUNCE_MS:   ${PROVYS_WATCHER_DEBOUNCE_MS:-1500}
      PROVYS_WATCHER_CONCURRENCY:   ${PROVYS_WATCHER_CONCURRENCY:-3}
      ASRUN_WATCH_FOLDER:           /app/tmp/asrun
      ASRUN_WATCHER_USE_POLLING:    ${ASRUN_WATCHER_USE_POLLING:-false}
      ASRUN_WATCHER_POLL_INTERVAL_MS: ${ASRUN_WATCHER_POLL_INTERVAL_MS:-60000}
      # Aktif saat penceresi (Europe/Istanbul) — pencere dışında izleme duraklar.
      ASRUN_WATCHER_ACTIVE_FROM:    ${ASRUN_WATCHER_ACTIVE_FROM:-23:30}
      ASRUN_WATCHER_ACTIVE_TO:      ${ASRUN_WATCHER_ACTIVE_TO:-02:00}
      ASRUN_WATCHER_DEBOUNCE_MS:    ${ASRUN_WATCHER_DEBOUNCE_MS:-1500}
      ASRUN_WATCHER_CONCURRENCY:    ${ASRUN_WATCHER_CONCURRENCY:-3}
      # Watcher canlı durumu worker'ın /health/live'ından proxy ile alınır.
      BCMS_WORKER_HEALTH_URL:       ${BCMS_WORKER_HEALTH_URL:-http://worker:3000}
      PORT: 3000
      NODE_ENV: production
      BCMS_BACKGROUND_SERVICES: none
      # Haber > AA: settings endpoint efektif (env+DB) ayarı API'de hesaplar;
      # worker ile aynı env defaults görünsün diye API'ye de eklendi.
      AA_API_BASE:            ${AA_API_BASE:-https://api.aa.com.tr}
      AA_API_USER:            ${AA_API_USER:-}
      AA_API_PASS:            ${AA_API_PASS:-}
      AA_API_POLL_SECONDS:    ${AA_API_POLL_SECONDS:-300}
      AA_API_FILTER_TYPE:     ${AA_API_FILTER_TYPE:-1}
      AA_API_FILTER_LANGUAGE: ${AA_API_FILTER_LANGUAGE:-1}
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: ${SMTP_FROM:-noreply@bcms.local}
      OPTA_DIR: /opta
    volumes:
      - opta_data:/opta
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bcms_net

  # ── Worker (arka plan servisleri — ingest, notifications) ────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    container_name: bcms_worker
    restart: unless-stopped
    logging: *default-logging
    stop_grace_period: 60s
    # Y15 (2026-05-29): /health/live per-service heartbeat liveness.
    # /health (eski) DB+RabbitMQ ping → deadlock'ta da "healthy" gosterirdi.
    # /health/live `service-heartbeat` Map'ten per-service threshold check.
    # Heartbeat 60sn'de 1 kez polling tick + event-driven (boot+her message).
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health/live"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # FA1 (2026-05-29): Prisma pool — API 30, Worker 20 (250 user scale).
      PRISMA_CONNECTION_LIMIT_API:    ${PRISMA_CONNECTION_LIMIT_API:-10}
      PRISMA_CONNECTION_LIMIT_WORKER: ${PRISMA_CONNECTION_LIMIT_WORKER:-5}
      PRISMA_POOL_TIMEOUT:            ${PRISMA_POOL_TIMEOUT:-5}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      NODE_ENV: production
      BCMS_BACKGROUND_SERVICES: notifications,ingest-worker,ingest-watcher,audit-retention,audit-partition,outbox-poller,provys-watcher,asrun-watcher,ssdb-resolver,search-worker,restore-worker,transfer-worker,news-mos-sender,news-wire-fetcher,news-aa-fetcher
      # Haber > Ajans: AA (Anadolu Ajansı) Media API doğrudan çekim (IOSTEK baypas).
      # Kimlikler .env'den; AA_API_USER/PASS yoksa news-aa-fetcher kendini kapatır.
      AA_API_BASE:            ${AA_API_BASE:-https://api.aa.com.tr}
      AA_API_USER:            ${AA_API_USER:-}
      AA_API_PASS:            ${AA_API_PASS:-}
      AA_API_POLL_SECONDS:    ${AA_API_POLL_SECONDS:-300}
      AA_API_FILTER_TYPE:     ${AA_API_FILTER_TYPE:-1}
      AA_API_FILTER_LANGUAGE: ${AA_API_FILTER_LANGUAGE:-1}
      AA_API_FILTER_CATEGORY: ${AA_API_FILTER_CATEGORY:-}
      AA_API_SEARCH_LIMIT:    ${AA_API_SEARCH_LIMIT:-30}
      AA_API_DOC_FORMAT:      ${AA_API_DOC_FORMAT:-newsml29}
      OUTBOX_POLLER_ENABLED: ${OUTBOX_POLLER_ENABLED:-false}
      OUTBOX_POLLER_DRY_RUN: ${OUTBOX_POLLER_DRY_RUN:-false}
      # PR-C2 cut-over flag: true → poller authoritative (shadow=pending,
      # direct publish skip). false/unset → Phase 2 shadow mode (rollback).
      OUTBOX_POLLER_AUTHORITATIVE: ${OUTBOX_POLLER_AUTHORITATIVE:-false}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      CORS_ORIGIN: ${CORS_ORIGIN}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8080/realms/bcms}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/bcms}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-bcms-web,bcms-api}
      INGEST_CALLBACK_SECRET: ${INGEST_CALLBACK_SECRET}
      INGEST_ALLOWED_ROOTS: ${INGEST_ALLOWED_ROOTS:-/opta,/app/tmp/watch}
      OPTA_SYNC_SECRET: ${OPTA_WATCHER_API_TOKEN}
      # SSDB MAM resolver — feature flag + read-only credentials. `.env`
      # içinde PROVYS_SSDB_RESOLVER=on + SSDB_PASSWORD set edildiğinde worker
      # tick periodic SSDB lookup yapar. Default off → tick erken return.
      PROVYS_SSDB_RESOLVER: ${PROVYS_SSDB_RESOLVER:-off}
      SSDB_HOST:     ${SSDB_HOST:-}
      SSDB_PORT:     ${SSDB_PORT:-}
      SSDB_DATABASE: ${SSDB_DATABASE:-}
      SSDB_USER:     ${SSDB_USER:-}
      SSDB_PASSWORD: ${SSDB_PASSWORD:-}
      # Concurrency limit'leri — clamp [1,10]; invalid/empty -> default.
      # lookup: SSDB query fan-out (resolver Tier 1/2/3 + MEDIA_LINK).
      # cache_write: Prisma upsert (P2024 onlem; worker icindeki 9 background
      # service ortak pool'u paylasiyor, audit ext per-write ek query yapar).
      SSDB_LOOKUP_CONCURRENCY:      ${SSDB_LOOKUP_CONCURRENCY:-5}
      SSDB_CACHE_WRITE_CONCURRENCY: ${SSDB_CACHE_WRITE_CONCURRENCY:-5}
      # SSDB resolver worker tuning (2026-05-28 deneme seti — env override; default=kod default'u).
      SSDB_WORKER_INTERVAL_MS:       ${SSDB_WORKER_INTERVAL_MS:-3600000}
      SSDB_WINDOW_FUTURE_DAYS:       ${SSDB_WINDOW_FUTURE_DAYS:-14}
      SSDB_WORKER_MAX_PER_TICK:      ${SSDB_WORKER_MAX_PER_TICK:-100}
      SSDB_BATCH_SIZE:               ${SSDB_BATCH_SIZE:-5}
      SSDB_TTL_FOUND_MIN:            ${SSDB_TTL_FOUND_MIN:-60}
      SSDB_TTL_DURATION_UNKNOWN_MIN: ${SSDB_TTL_DURATION_UNKNOWN_MIN:-120}
      SSDB_TTL_MISSING_MIN:          ${SSDB_TTL_MISSING_MIN:-30}
      SSDB_TTL_ERROR_MIN:            ${SSDB_TTL_ERROR_MIN:-5}
      # Restore + Transfer V2 — Avid Interplay iki kademeli iş akışı (2026-05-28).
      # Mock mode default ON; gerçek Avid bağlantısı kullanıcı kontrolünde
      # test edildiğinde (.env'de) RESTORE_AVID_ENABLED=on + RESTORE_AVID_MOCK=false.
      RESTORE_AVID_ENABLED:    ${RESTORE_AVID_ENABLED:-off}
      RESTORE_AVID_MOCK:       ${RESTORE_AVID_MOCK:-true}
      AVID_INTERPLAY_URL:      ${AVID_INTERPLAY_URL:-}
      AVID_USER:               ${AVID_USER:-}
      AVID_PASSWORD:           ${AVID_PASSWORD:-}
      AVID_WORKSPACE:          ${AVID_WORKSPACE:-}
      AVID_REQUEST_TIMEOUT_MS: ${AVID_REQUEST_TIMEOUT_MS:-30000}
      # K3 transfer — Cloud UX / CTMS submitSTPJob (transfer worker burada koşar).
      AVID_CLOUDUX_URL:        ${AVID_CLOUDUX_URL:-}
      AVID_CLOUDUX_REALM:      ${AVID_CLOUDUX_REALM:-}
      AVID_CLOUDUX_TOKEN:      ${AVID_CLOUDUX_TOKEN:-}
      # ROPC self-healing token (no_refresh_token=true → re-login). TOKEN boşsa bunlar şart.
      AVID_CLOUDUX_USER:         ${AVID_CLOUDUX_USER:-}
      AVID_CLOUDUX_PASSWORD:     ${AVID_CLOUDUX_PASSWORD:-}
      AVID_CLOUDUX_CLIENT_BASIC: ${AVID_CLOUDUX_CLIENT_BASIC:-}
      # Capture Web Service (Faz 0 — SALT-OKUMA; default KAPALI; DB satırı env'i override eder)
      CAPTURE_WS_URL:            ${CAPTURE_WS_URL:-}
      CAPTURE_WS_ENABLED:        ${CAPTURE_WS_ENABLED:-false}
      CAPTURE_WS_TIMEOUT_MS:     ${CAPTURE_WS_TIMEOUT_MS:-10000}
      AVID_STP_DEVICE:         ${AVID_STP_DEVICE:-MCR}
      AVID_STP_PROFILE:        ${AVID_STP_PROFILE:-MCR}
      AVID_CLOUDUX_INSECURE_TLS: ${AVID_CLOUDUX_INSECURE_TLS:-true}
      SEARCH_WORKER_INTERVAL_MS:   ${SEARCH_WORKER_INTERVAL_MS:-5000}
      SEARCH_MAX_PER_TICK:         ${SEARCH_MAX_PER_TICK:-20}
      SEARCH_CONCURRENCY:          ${SEARCH_CONCURRENCY:-3}
      SEARCH_MAX_ATTEMPTS:         ${SEARCH_MAX_ATTEMPTS:-3}
      RESTORE_WORKER_INTERVAL_MS:  ${RESTORE_WORKER_INTERVAL_MS:-5000}
      RESTORE_MAX_PER_TICK:        ${RESTORE_MAX_PER_TICK:-20}
      RESTORE_CONCURRENCY:         ${RESTORE_CONCURRENCY:-3}
      RESTORE_MAX_ATTEMPTS:        ${RESTORE_MAX_ATTEMPTS:-2}
      TRANSFER_WORKER_INTERVAL_MS: ${TRANSFER_WORKER_INTERVAL_MS:-5000}
      TRANSFER_MAX_PER_TICK:       ${TRANSFER_MAX_PER_TICK:-20}
      TRANSFER_CONCURRENCY:        ${TRANSFER_CONCURRENCY:-3}
      TRANSFER_MAX_ATTEMPTS:       ${TRANSFER_MAX_ATTEMPTS:-3}
      LOG_LEVEL: info
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: ${SMTP_FROM:-noreply@bcms.local}
      WATCH_FOLDER: /app/tmp/watch
      # Provys SMB akış izleyici — host CIFS mount + bind volume.
      # PROVYS_HOST_MOUNT host tarafında elle mount edilmiş cifs path olur
      # (örn. /mnt/provys); credential repo'ya konmaz, host operasyon sorumlu.
      PROVYS_WATCH_FOLDER: /app/tmp/provys
      # CIFS mount'ta inotify diğer SMB client'larının yazımını taşımıyor;
      # polling moduyla yeni dosyalar interval (default 30sn) içinde yakalanır.
      PROVYS_WATCHER_USE_POLLING: ${PROVYS_WATCHER_USE_POLLING:-false}
      PROVYS_WATCHER_POLL_INTERVAL_MS: ${PROVYS_WATCHER_POLL_INTERVAL_MS:-30000}
      # Asrun SMB Outbox/Ok izleyici — Provys'ten ayrı mount + ayrı polling.
      # ASRUN_HOST_MOUNT host tarafında elle CIFS mount edilen yol
      # (örn. /mnt/asrun-ok). Credential repo'ya konmaz; host operasyon
      # sorumlu. Mount yoksa watcher kontrollü warn ile başlatılmaz —
      # container crash'lemez (bkz. asrun.watcher.ts existsSync guard).
      ASRUN_WATCH_FOLDER: /app/tmp/asrun
      ASRUN_WATCHER_USE_POLLING: ${ASRUN_WATCHER_USE_POLLING:-false}
      ASRUN_WATCHER_POLL_INTERVAL_MS: ${ASRUN_WATCHER_POLL_INTERVAL_MS:-60000}
      # Aktif saat penceresi (Europe/Istanbul) — pencere dışında izleme duraklar.
      ASRUN_WATCHER_ACTIVE_FROM: ${ASRUN_WATCHER_ACTIVE_FROM:-23:30}
      ASRUN_WATCHER_ACTIVE_TO: ${ASRUN_WATCHER_ACTIVE_TO:-02:00}
      ASRUN_WATCHER_DEBOUNCE_MS: ${ASRUN_WATCHER_DEBOUNCE_MS:-1500}
      ASRUN_WATCHER_CONCURRENCY: ${ASRUN_WATCHER_CONCURRENCY:-3}
    volumes:
      - ingest_watch:/app/tmp/watch
      # rslave: host CIFS mount (boot'ta veya sonradan gelse de) çalışan
      # worker container'ına yansısın → SMB watcher reboot-safe, docker'ı
      # bloklamaz (bkz. provys-smb-mount-pending). ro: salt okunur.
      - ${PROVYS_HOST_MOUNT:-./tmp/provys}:/app/tmp/provys:ro,rslave
      - ${ASRUN_HOST_MOUNT:-./tmp/asrun}:/app/tmp/asrun:ro,rslave
    # HIGH-INF-017 (kapatıldı 2026-05-05): `api`'ye depends_on kaldırıldı.
    # Worker'ın API'ye runtime bağımlılığı yok; aynı imajdan farklı entry'lerle
    # çalışıyorlar. depends_on sadece startup ordering kontrol eder, ama buradaki
    # cascading restart riskini de ortadan kaldırıyor.
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bcms_net

  # ── Angular (nginx) ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: production
    container_name: bcms_web
    restart: unless-stopped
    logging: *default-logging
    environment:
      BCMS_KEYCLOAK_PUBLIC_URL: ${BCMS_KEYCLOAK_PUBLIC_URL:-https://beinport}
    # nginx 80 → 443 redirect; 443 TLS termination + reverse proxy (api + keycloak).
    # Audit CRIT-002: 4200 portu kaldırıldı; edge'de sadece standart 80/443.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Volume mount yaklaşımı (image rebuild yok):
      # - nginx config (TLS + reverse proxy + security headers)
      # - TLS cert chain (BCMS internal CA tarafından imzalı)
      # - TLS private key (.gitignore ile repo dışı)
      # Bkz: ops/REQUIREMENTS-TLS-INTERNAL-CA.md
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/tls/server/server-fullchain.crt:/etc/nginx/tls/server-fullchain.crt:ro
      - ./infra/tls/server/server.key:/etc/nginx/tls/server.key:ro
    healthcheck:
      # 443 üzerinden self-signed olduğu için -k flag (CA verify atla — sadece liveness check)
      test: ["CMD-SHELL", "curl -fsSk https://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - api
      - keycloak
    networks:
      - bcms_net

  # ── OPTA SMB Watcher ─────────────────────────────────────────────────────────
  opta-watcher:
    build:
      context: .
      dockerfile: infra/docker/opta-watcher.Dockerfile
    container_name: bcms_opta_watcher
    restart: unless-stopped
    logging: *default-logging
    networks:
      - bcms_net
    environment:
      HOME: /data
      BCMS_API_URL: http://api:3000/api/v1
      BCMS_API_TOKEN: ${OPTA_WATCHER_API_TOKEN}
      OPTA_SMB_SHARE: ${OPTA_SMB_SHARE}
      OPTA_SMB_SUBDIR: ${OPTA_SMB_SUBDIR}
      OPTA_SMB_USERNAME: ${OPTA_SMB_USERNAME}
      OPTA_SMB_PASSWORD: ${OPTA_SMB_PASSWORD}
      OPTA_SMB_DOMAIN: ${OPTA_SMB_DOMAIN}
      OPTA_POLL_INTERVAL: ${OPTA_POLL_INTERVAL:-3600}
    volumes:
      - opta_watcher_state:/data
    healthcheck:
      # HIGH-INF-013 fix (2026-05-05): explicit interval/timeout/retries.
      # Default 30s/30s/3 = bir failure 90s'ye yayılır; opta-watcher uzun
      # SMB sync sırasında pgrep yine pass eder (sürec varlığı kontrol).
      test: ["CMD-SHELL", "pgrep -f opta_smb_watcher.py || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - api

  # ── Mailhog (Dev SMTP) ────────────────────────────────────────────────────────
  # DÜŞÜK-INF-4.1.12 (2026-05-04): mailhog yalnızca dev/staging için.
  # Production deployment'ta bu service tamamen kapatılmalı:
  #   docker compose --profile dev up -d   (→ mailhog dahil)
  #   docker compose up -d                 (→ mailhog dahil değil, default profile)
  # API ve worker SMTP_HOST'u SMTP relay servisine yönlendirilmeli.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: bcms_mailhog
    restart: unless-stopped
    profiles: ["dev"]
    logging: *default-logging
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - bcms_net

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: bcms_prometheus
    restart: unless-stopped
    logging: *default-logging
    # GitGuardian fix (2026-05-04): healthcheck base64 token .env'den geliyor.
    # Eski hâlinde docker-compose.yml içinde literal base64 ('admin:changeme_prom')
    # bulunuyordu; GitGuardian "Base64 Basic Authentication exposed" alarmı verdi.
    # Artık `${PROMETHEUS_HEALTHCHECK_AUTH_B64}` env'den compose-substitute edilir
    # ve container environment'a aktarılır; healthcheck shell'de expand edilir.
    # web-config.yml'deki bcrypt hash de aynı plaintext'i hash'lemeli.
    # Rotation: ops/RUNBOOK-SECRETS-ROTATION.md
    environment:
      PROMETHEUS_HEALTHCHECK_AUTH_B64: ${PROMETHEUS_HEALTHCHECK_AUTH_B64:?PROMETHEUS_HEALTHCHECK_AUTH_B64 env zorunlu — bkz ops/RUNBOOK-SECRETS-ROTATION.md}
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      # HIGH-INF-012 fix (2026-05-05): basic auth web config
      - ./infra/prometheus/web-config.yml:/etc/prometheus/web-config.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.config.file=/etc/prometheus/web-config.yml'
      - '--storage.tsdb.retention.time=30d'
      # DÜŞÜK-INF-4.3.4 fix (2026-05-04): retention size cap.
      # 30d × ~50MB/gün = ~1.5GB ortalama; high-cardinality metric eklenince
      # disk dolma riski. Hard upper bound 5GB.
      - '--storage.tsdb.retention.size=5GB'
    healthcheck:
      # GitGuardian fix (2026-05-04): hardcoded base64 yerine env reference.
      # `$${VAR}` compose escape; literal `${VAR}` container'a gider, shell expand.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --header=\"Authorization: Basic $${PROMETHEUS_HEALTHCHECK_AUTH_B64}\" http://127.0.0.1:9090/-/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - bcms_net

  # ── AlertManager (K15, 2026-05-29) ──────────────────────────────────────────
  # Prometheus alert rules'unu email + Slack'e push eder. Email: mevcut SMTP
  # env'leri (dev: mailhog; prod: SMTP_HOST override). Slack: SLACK_WEBHOOK_URL
  # env'i set edilirse aktif; boş ise receiver pasif (warn log).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bcms_alertmanager
    restart: unless-stopped
    logging: *default-logging
    volumes:
      # Static config (dev: mailhog + Slack placeholder). Prod için:
      # `bash ops/scripts/alertmanager-render-config.sh` ile .env'den render
      # edip ardından `docker compose restart alertmanager` çalıştır.
      - ./infra/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/config.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
      - --cluster.listen-address=
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - bcms_net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: bcms_grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      # ORTA-INF-4.1.11 (2026-05-04): GRAFANA_PASSWORD env'i strong default
      # yok; .env'de zayıfsa açık. Production deployment checklist:
      #   1. openssl rand -base64 24 → GRAFANA_PASSWORD
      #   2. Grafana ilk login sonrası API key/service account ile dashboard'lar
      # Empty/missing → Grafana boot fail (env zorunlu reference).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD env zorunlu}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - bcms_net

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  opta_data:
  ingest_watch:
  opta_watcher_state:

networks:
  bcms_net:
    driver: bridge
