services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bcms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB},${KEYCLOAK_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bcms_net

  # ── PostgreSQL Backup Sidecar ────────────────────────────────────────────────
  # Daily pg_dump for both bcms and keycloak databases.
  # Retention: 7 daily + 4 weekly + 6 monthly. Output: gzipped SQL.
  # Restore runbook: infra/postgres/RESTORE.md
  postgres_backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: bcms_postgres_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB},${KEYCLOAK_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "--clean --if-exists --quote-all-identifiers"
      SCHEDULE: "0 3 * * *"      # 03:00 daily (host TZ)
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: Europe/Istanbul
    volumes:
      - ./infra/postgres/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bcms_net

  # ── RabbitMQ 3.12 ────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: bcms_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - bcms_net

  # ── Keycloak 23 ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: bcms_keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-false}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-172.28.204.133}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8080}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bcms_net

  # ── API (Fastify — sadece HTTP istekleri, worker'sız) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    container_name: bcms_api
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://172.28.204.133:8080/realms/bcms}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://172.28.204.133:8080/realms/bcms,http://localhost:8080/realms/bcms}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-bcms-web,bcms-api}
      INGEST_CALLBACK_SECRET: ${INGEST_CALLBACK_SECRET}
      INGEST_ALLOWED_ROOTS: ${INGEST_ALLOWED_ROOTS:-/opta,/app/tmp/watch}
      OPTA_SYNC_SECRET: ${OPTA_WATCHER_API_TOKEN}
      PORT: 3000
      NODE_ENV: production
      BCMS_BACKGROUND_SERVICES: none
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: ${SMTP_FROM:-noreply@bcms.local}
      STORAGE_HOST: ${STORAGE_HOST}
      OPTA_DIR: /opta
    volumes:
      - opta_data:/opta
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bcms_net

  # ── Worker (arka plan servisleri — ingest, bxf, notifications) ───────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    container_name: bcms_worker
    restart: unless-stopped
    stop_grace_period: 60s
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      NODE_ENV: production
      BCMS_BACKGROUND_SERVICES: notifications,ingest-worker,ingest-watcher,bxf-watcher,audit-retention
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      CORS_ORIGIN: ${CORS_ORIGIN}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://172.28.204.133:8080/realms/bcms,http://localhost:8080/realms/bcms}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://172.28.204.133:8080/realms/bcms}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-bcms-web,bcms-api}
      INGEST_CALLBACK_SECRET: ${INGEST_CALLBACK_SECRET}
      INGEST_ALLOWED_ROOTS: ${INGEST_ALLOWED_ROOTS:-/opta,/app/tmp/watch}
      OPTA_SYNC_SECRET: ${OPTA_WATCHER_API_TOKEN}
      LOG_LEVEL: info
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: ${SMTP_FROM:-noreply@bcms.local}
      STORAGE_HOST: ${STORAGE_HOST}
      BXF_WATCH_DIR: ${BXF_WATCH_DIR:-/app/tmp/bxf}
      WATCH_FOLDER: /app/tmp/watch
    volumes:
      - ingest_watch:/app/tmp/watch
      - bxf_watch:/app/tmp/bxf
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - bcms_net

  # ── Angular (nginx) ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: production
    container_name: bcms_web
    restart: unless-stopped
    environment:
      BCMS_KEYCLOAK_PUBLIC_URL: ${BCMS_KEYCLOAK_PUBLIC_URL:-http://172.28.204.133:8080}
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    networks:
      - bcms_net

  # ── OPTA SMB Watcher ─────────────────────────────────────────────────────────
  opta-watcher:
    build:
      context: .
      dockerfile: infra/docker/opta-watcher.Dockerfile
    container_name: bcms_opta_watcher
    restart: unless-stopped
    networks:
      - bcms_net
    environment:
      HOME: /data
      BCMS_API_URL: http://api:3000/api/v1
      BCMS_API_TOKEN: ${OPTA_WATCHER_API_TOKEN}
      OPTA_SMB_SHARE: ${OPTA_SMB_SHARE}
      OPTA_SMB_SUBDIR: ${OPTA_SMB_SUBDIR}
      OPTA_SMB_USERNAME: ${OPTA_SMB_USERNAME}
      OPTA_SMB_PASSWORD: ${OPTA_SMB_PASSWORD}
      OPTA_SMB_DOMAIN: ${OPTA_SMB_DOMAIN}
      OPTA_POLL_INTERVAL: ${OPTA_POLL_INTERVAL:-3600}
    volumes:
      - opta_watcher_state:/data
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f opta_smb_watcher.py || exit 1"]
      start_period: 30s
    depends_on:
      - api

  # ── Mailhog (Dev SMTP) ────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: bcms_mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - bcms_net

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: bcms_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - bcms_net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: bcms_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - bcms_net

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  opta_data:
  ingest_watch:
  bxf_watch:
  opta_watcher_state:

networks:
  bcms_net:
    driver: bridge
