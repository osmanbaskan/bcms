# BCMS api — Fastify, HTTP-only (BCMS_BACKGROUND_SERVICES=none). Stateless → 2 replica.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcms-api
  namespace: bcms
  labels: { app: bcms-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: bcms-api } }
  template:
    metadata:
      labels: { app: bcms-api }
    spec:
      nodeSelector: { role: cpu }        # CPU node havuzu (GPU node'a düşmesin)
      containers:
        - name: api
          image: REGISTRY/bcms-api:TAG   # ← registry + tag ile değiştir (CI push)
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: bcms-config }
            - secretRef:    { name: bcms-secrets }
          readinessProbe:                 # /health = DB + RabbitMQ ping (trafiğe hazır mı)
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:                  # /health/live = per-service heartbeat (süreç sağ mı)
            httpGet: { path: /health/live, port: 3000 }
            initialDelaySeconds: 25
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: bcms
spec:
  selector: { app: bcms-api }
  ports:
    - port: 3000
      targetPort: 3000
