# Üretimde sırları şöyle ver (repo'ya girmeden):
#   kubectl create secret generic bcms-secrets -n bcms --from-env-file=secrets.env
# veya Sealed Secrets / External Secrets Operator kullan.
apiVersion: v1
kind: Secret
metadata:
  name: bcms-secrets
  namespace: bcms
type: Opaque
stringData:
  # Faz-1'de DB cluster dışında olabilir; Faz-3'te CloudNativePG service'i:
  DATABASE_URL: "postgresql://USER:PASS@HOST:5432/bcms?schema=public"
  # Avid / Cloud UX (ROPC login)
  AVID_USER: "<<doldur>>"
  AVID_PASSWORD: "<<doldur>>"
  AVID_CLOUDUX_USER: "<<doldur>>"
  AVID_CLOUDUX_PASSWORD: "<<doldur>>"
  AVID_CLOUDUX_CLIENT_BASIC: "<<doldur>>"
  # AA Media API
  AA_API_USER: "<<doldur>>"
  AA_API_PASS: "<<doldur>>"
  # SMTP / Keycloak admin / vb.
  SMTP_PASSWORD: "<<doldur>>"
  # ... .env'deki diğer SIR anahtarlarını ekle (parola/token/secret)
