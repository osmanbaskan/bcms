global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ORTA-INF-4.3.2 (2026-05-04): alertmanager hedefi boş — alert kuralları
# var ama alarm gittiği yer yok. Production'a çıkarken aşağıdakilerden birini
# ayarla:
#   - Alertmanager container ekle (docker-compose 'alertmanager:9093' service)
#   - Slack/Email/PagerDuty webhook receiver tanımla
# Şu an sessiz: alert UI'da Prometheus 'firing' gösterir ama push yok.
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
        # Örnek: - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'bcms-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    # ÖNEMLİ-API-1.1.20 (2026-05-04): application-katmanı Bearer token.
    # Token api container env'inden geliyor (METRICS_TOKEN); aynı değeri
    # prometheus container'a da `bcms_metrics_token` dosyası olarak verin
    # veya yorumu kaldırıp `authorization` ile inline kullanın.
    # bearer_token_file: /etc/prometheus/bcms_metrics_token
    # Şu an yorumda: METRICS_TOKEN env'i set edilmediyse api allow ediyor
    # (legacy davranış). Production'da set edip yorumu açın.

# Removed 2026-05-04 (audit CRIT-006): postgres-exporter, node-exporter,
# rabbitmq prometheus plugin yokken phantom scrape job'ları "down" alarm üretiyordu.
# Aşağıdaki target'ları geri eklemek için önce ilgili exporter servisini docker-compose.yml'e
# eklemek gerekir:
#   - postgres-exporter:9187 (https://github.com/prometheus-community/postgres_exporter)
#   - node-exporter:9100     (https://github.com/prometheus/node_exporter)
#   - rabbitmq:15692         (RabbitMQ image'a `rabbitmq_prometheus` plugin enable)
