groups:
  - name: opta_observability
    interval: 1m
    rules:
      # HIGH-003 — Caller anomaly: total OPTA league sync rate (create+update+skip) > 500/h
      # Catches "silent burst" where post-dedupe (a0946c4) most calls become skip but
      # caller is still hitting /opta/sync at high rate. This rule fires regardless of
      # action breakdown because what matters is the caller behavior.
      - alert: OptaLeagueSyncBurst
        expr: sum(increase(bcms_opta_league_sync_total[1h])) > 500
        for: 0m
        labels:
          severity: warning
          area: opta
        annotations:
          summary: "OPTA league sync rate anormal yüksek (caller anomali)"
          description: "Son 1 saat içinde toplam {{ $value }} league sync action — normal saatlik ritim ~4-84. Burst tekrar olabilir; /opta/sync caller davranışını kontrol et."
          runbook: "BCMS_AUDIT_REPORT_2026-05-01.md HIGH-003"

      # Data write anomaly: actual create+update operations (excludes idempotent skip).
      # Allow-list matcher (=~"create|update") instead of negative (!="skip") to avoid
      # silently catching unexpected new label values.
      - alert: OptaLeagueWriteBurst
        expr: sum(increase(bcms_opta_league_sync_total{action=~"create|update"}[1h])) > 200
        for: 0m
        labels:
          severity: warning
          area: opta
        annotations:
          summary: "OPTA league actual write rate anormal yüksek (data anomali)"
          description: "Son 1 saat içinde {{ $value }} gerçek League DB write (create+update). Normal beklenti < 200/h; üst sınır audit_logs şişmesine de neden olur."
          runbook: "BCMS_AUDIT_REPORT_2026-05-01.md HIGH-003"

  # Madde 1 PR-1D (audit doc): audit partition gözlemi.
  # Gauge -1 sentinel = non-partitioned (dev/test); alert ifadeleri "x >= 0 AND x < N"
  # guard'ı ile non-prod scrape'leri skip eder.
  - name: bcms_audit_partition
    interval: 1m
    rules:
      - alert: BCMSAuditDefaultPartitionNonEmpty
        # > 0 zaten -1 için tetiklenmez (defensive yorum).
        expr: bcms_audit_default_partition_rows > 0
        for: 2h
        labels:
          severity: warning
          area: audit
        annotations:
          summary: "audit_logs_default partition'ında satır birikiyor (pre-create cron failure göstergesi)"
          description: "{{ $value }} satır 2 saatten uzun süredir default partition'da. PR-1C cron çalışmıyor olabilir veya ileri partitions yetmiyor — kontrol et."
          runbook: "ops/RUNBOOK-AUDITLOG-PARTITION-DEPLOY.md §6"

      - alert: BCMSAuditPartitionPreCreateFailing
        # -1 (non-partitioned) tetiklemesin: >= 0 guard'ı.
        # < 4: current + 3 ileri ay window beklenir (PR-1C monthsAhead=4).
        expr: bcms_audit_partition_count >= 0 and bcms_audit_partition_count < 4
        for: 1h
        labels:
          severity: warning
          area: audit
        annotations:
          summary: "Monthly partition sayısı 4'ten az (pre-create cron sorunu)"
          description: "{{ $value }} partition. PR-1C audit-partition job'u kontrol et: container çalışıyor mu, log'lar ne diyor?"
          runbook: "ops/REQUIREMENTS-AUDITLOG-PARTITION-V1.md PR-1C"
