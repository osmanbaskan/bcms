# BCMS nginx config — TLS termination + reverse proxy
# Volume mount ile container'a yüklenir (image rebuild yok).
# Bkz: ops/REQUIREMENTS-TLS-INTERNAL-CA.md

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ana server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name beinport localhost;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/tls/server-fullchain.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — internal CA için anlamsız ama production için hazır
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # P0.1 fix (2026-05-29): "DENY" → "SAMEORIGIN". Keycloak silent-check-sso
    # iframe akışı kendi 3p-cookies test'inde `https://beinport/` framing
    # yapıyor (same-origin); DENY blokluyordu. SAMEORIGIN external iframe
    # clickjacking korumasını korur, sadece aynı origin'e izin verir.
    add_header X-Frame-Options          "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # Basic CSP — Google Fonts CDN izni (Material Icons + Material Icons Outlined için).
    # Google Fonts browser tarafından çekilir, BCMS server network'üne gitmez (kullanıcı kuralı uyumlu).
    # Strict (nonce-based) CSP ayrı follow-up PR'ında uygulanacak.
    # ÖNEMLİ-INF-4.2.1 fix (2026-05-04): 'unsafe-eval' kaldırıldı.
    # Angular 21 AOT build'i eval gerektirmiyor (sadece JIT debug modu);
    # production bundle 'unsafe-eval' olmadan çalışır. XSS attack surface'i
    # belirgin azaldı. 'unsafe-inline' Angular template inline style'ı için
    # geçici olarak kalıyor (nonce'lı CSP follow-up'ta).
    # P0.1 (2026-05-29): frame-src 'self' eklendi — silent-check-sso iframe
    # `silentCheckSsoRedirectUri = /assets/silent-check-sso.html` için.
    # Keycloak `/realms/...` aynı origin altında host'lanır (path-based proxy),
    # `default-src 'self'` zaten yeterli; defensive olarak explicit yazıldı.
    #
    # P0.1 fix (2026-05-29): `frame-ancestors 'none'` → `'self'`. Keycloak
    # silent-check-sso 3p-cookies test akışı `https://beinport/` framing
    # yapıyor (Keycloak iframe içinden); `'none'` blokluyor → login ekranına
    # ulaşılamıyordu. `'self'` aynı origin'e izin verir, external iframe
    # clickjacking yine reddedilir.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-src 'self'; frame-ancestors 'self';" always;
    add_header X-Robots-Tag             "noindex, nofollow"                     always;

    root /usr/share/nginx/html;
    index index.html;
    # LOW-INF-006 fix (2026-05-05): Excel export ve ingest dosya yüklemeleri
    # için 10m yetmeyebiliyordu (50K row sıkıştırılmış xlsx ~25MB). 100m yeterli.
    client_max_body_size 100m;
    access_log /var/log/nginx/access.log;

    # ── Keycloak — reverse proxy (path-based routing) ───────────────────────
    # 2026-05-11 fix: `/admin` Keycloak admin console için TAMAMI kapsanmıyor;
    # sadece Keycloak'ın gerçek admin path'leri `/admin/master/*` ve
    # `/admin/realms/*` proxy'lenir. Diğer `/admin/*` Angular route'larına
    # (örn. `/admin/live-plan-lookups`) izin verilir — SPA fallback'e düşer.
    # Keycloak Admin Console + login/auth flow same-origin iframe'leri açar
    # (3p-cookies/step1.html, login-status-iframe.html, vb.). Server-level
    # global CSP `frame-ancestors 'none'` ve `X-Frame-Options: DENY` bu
    # iframe'leri blokluyor — sadece Keycloak path'leri için gevşet
    # (frame-ancestors 'self' + SAMEORIGIN). BCMS Angular SPA için global
    # `'none'` policy aynen korunur, başka location etkilenmez.
    location ~ ^/(realms|resources|js|robots\.txt) {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-Frame-Options           "SAMEORIGIN"                           always;
        add_header Content-Security-Policy   "frame-ancestors 'self';"              always;
        add_header Referrer-Policy           "no-referrer"                          always;
    }

    location ~ ^/admin/(master|realms)(/|$) {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-Frame-Options           "SAMEORIGIN"                           always;
        add_header Content-Security-Policy   "frame-ancestors 'self';"              always;
        add_header Referrer-Policy           "no-referrer"                          always;
    }

    # ── BCMS API ────────────────────────────────────────────────────────────
    # FA3 (2026-05-29, 250 user scale): location-specific proxy_read_timeout.
    # Eski: tüm /api/ 180s → webhook fail = 3 dk hang + nginx connection pool
    # tutulur. Yeni: endpoint tipine göre 30s/60s/300s ayrım.

    # Excel/PDF export — büyük dosya, uzun timeout şart.
    location ~* ^/api/v1/.*/(export|reports/.*export) {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Provys SSE — long-lived connection, heartbeat 25s, timeout uzun.
    location = /api/v1/provys/stream {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Bildirim SSE — long-lived connection, heartbeat 25s, timeout uzun.
    location = /api/v1/notifications/stream {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Normal API: 60s — restore-missing 6 kanal toplama ~10ms, tipik <200ms.
        # Hala anormal yavaş response durumunda 60s tolere.
        proxy_read_timeout 60s;
    }

    # ── Webhooks (ingest callback, OPTA sync) ───────────────────────────────
    location /webhooks/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        # Webhook tipik <2s; 30s tolere; fail hızlı dön ve nginx conn pool
        # boşalsın (250 user'da snowball önemli).
        proxy_read_timeout 30s;
    }

    # ── Swagger UI (HIGH-API-010 ile NODE_ENV gate'lenecek) ─────────────────
    location /docs {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Health endpoint ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    # ── Block /metrics from external access ─────────────────────────────────
    # Prometheus pull internal Docker network üzerinden api:3000/metrics yapar.
    location /metrics {
        deny all;
        return 403;
    }

    # ── Static assets — cache ───────────────────────────────────────────────
    location = /assets/runtime-config.js {
        # runtime-config.js cache'lenmemeli (env-specific values)
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ── Angular SPA fallback ────────────────────────────────────────────────
    location / {
        # index.html ASLA cache'lenmemeli: yeni deploy'un hash'li asset
        # referansları (styles-XXXX.css / main-XXXX.js) tarayıcıda anında
        # görünsün. Aksi halde tarayıcı eski index.html'i tutup eski CSS/JS'e
        # kilitleniyor ("değişiklikleri görmüyorum"). Hash'li .js/.css zaten
        # immutable (yukarıda) — yalnız giriş noktası taze kalmalı.
        # `expires -1` kullanıldı (add_header DEĞİL): Cache-Control: no-cache
        # üretir AMA server-level güvenlik header'larının (HSTS/CSP/X-Frame)
        # inheritance'ını bozmaz. `add_header Cache-Control` kullanılsaydı bu
        # location'da güvenlik header'ları düşerdi.
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ─────────────────────────────────────────────────────────
    # FA2 (2026-05-29, 250 user scale): level 4 (default 1 → 4) → +5% sıkıştırma,
    # nginx CPU minimal artış. Level 6 daha iyi sıkıştırma ama 250 paralel
    # download'da nginx CPU saturate olabilir.
    # min_length 1024: 1 KB altı dosyalar gzip maliyeti > kazanç.
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript;
}
