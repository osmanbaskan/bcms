# BCMS nginx config — TLS termination + reverse proxy
# Volume mount ile container'a yüklenir (image rebuild yok).
# Bkz: ops/REQUIREMENTS-TLS-INTERNAL-CA.md

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ana server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name beinport localhost;

    # ── TLS ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/tls/server-fullchain.crt;
    ssl_certificate_key /etc/nginx/tls/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — internal CA için anlamsız ama production için hazır
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "DENY"                                  always;
    add_header X-Content-Type-Options   "nosniff"                               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # Basic CSP — Strict (nonce-based) CSP ayrı follow-up PR'ında uygulanacak
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Robots-Tag             "noindex, nofollow"                     always;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;
    access_log /var/log/nginx/access.log;

    # ── Keycloak — reverse proxy (path-based routing) ───────────────────────
    location ~ ^/(realms|admin|resources|js|robots\.txt) {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── BCMS API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
    }

    # ── Webhooks (ingest callback, OPTA sync) ───────────────────────────────
    location /webhooks/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Swagger UI (HIGH-API-010 ile NODE_ENV gate'lenecek) ─────────────────
    location /docs {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Health endpoint ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    # ── Block /metrics from external access ─────────────────────────────────
    # Prometheus pull internal Docker network üzerinden api:3000/metrics yapar.
    location /metrics {
        deny all;
        return 403;
    }

    # ── Static assets — cache ───────────────────────────────────────────────
    location = /assets/runtime-config.js {
        # runtime-config.js cache'lenmemeli (env-specific values)
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ── Angular SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript;
}
