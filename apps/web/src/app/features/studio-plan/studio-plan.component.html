<section class="studio-plan-page">
  <header class="page-header">
    <div>
      <h1>Stüdyo Planı</h1>
      <p>{{ dateRangeLabel() }} · {{ weekTimeRangeStart() }} - {{ weekTimeRangeEnd() }} · 15 dakikalık slotlar</p>
    </div>

    <div class="page-actions">
      <button mat-stroked-button type="button" (click)="toggleFullscreen()">
        <mat-icon>{{ fullscreenActive() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
        {{ fullscreenActive() ? 'Tam Ekrandan Çık' : 'Tam Ekran' }}
      </button>
      <button mat-stroked-button type="button" (click)="exportPlan()">
        <mat-icon>picture_as_pdf</mat-icon>
        Export PDF
      </button>
      <!-- 2026-05-27: Excel export tarih aralığı (1-14 gün). Default = seçili
           hafta Pzt-Pazar. weekStart değişiminde reset. -->
      <div class="excel-range" [class.invalid]="!exportRangeValid()">
        <label class="excel-range-field">
          <span>Excel başlangıç</span>
          <input
            type="date"
            [value]="exportRangeStart"
            (change)="exportRangeStart = $any($event.target).value"
          />
        </label>
        <label class="excel-range-field">
          <span>Excel bitiş</span>
          <input
            type="date"
            [value]="exportRangeEnd"
            (change)="exportRangeEnd = $any($event.target).value"
          />
        </label>
        <span class="excel-range-info" *ngIf="exportRangeValid()">
          {{ exportRangeDayCount() }} gün
        </span>
        <span class="excel-range-error" *ngIf="!exportRangeValid()">
          {{ exportRangeError() }}
        </span>
      </div>
      <button
        mat-flat-button
        color="primary"
        type="button"
        [disabled]="!exportRangeValid()"
        (click)="exportToExcel()"
      >
        <mat-icon>table</mat-icon>
        Export Excel
      </button>
      <!-- 2026-05-27: multi-week plan fetch fail durumunda yarım dosya
           indirilmesin diye export abort + visible error chip. -->
      <span class="excel-export-error" *ngIf="exportError()">{{ exportError() }}</span>
    </div>
  </header>

  <div #planShell id="studio-plan-export" class="plan-shell">
    <!-- 2026-05-14: Toolbar fullscreen container'ı içinde — fullscreen modda
         operatör view-mode/program/renk/silgi araçlarına erişebilsin. Normal
         modda layout aynı kalır (sticky kuralı sadece :fullscreen altında). -->
    <app-studio-plan-toolbar
      class="plan-shell-toolbar no-print"
      [weekStart]="weekStart"
      [weekOptions]="weekOptions"
      [viewMode]="viewMode()"
      [programs]="programs()"
      [colors]="colors()"
      [selectedProgram]="selectedProgram"
      [selectedColor]="selectedColor"
      [readonly]="!canEdit()"
      [eraserMode]="eraserMode()"
      [loading]="loading()"
      [saving]="saving()"
      [saveError]="saveError()"
      [lastSavedAt]="lastSavedAt()"
      (weekStartChange)="onWeekStartChange($event)"
      (viewModeChange)="canEdit() && viewMode.set($event)"
      (selectedProgramChange)="selectedProgram = $event"
      (selectedColorChange)="selectedColor = $event"
      (clearSelection)="clearSelection()"
      (moveCurrentWeekToNextWeek)="moveCurrentWeekToNextWeek()"
      (copySelectedProgramToNextWeek)="copySelectedProgramToNextWeek()"
      (eraserModeChange)="eraserMode.set($event)"
    ></app-studio-plan-toolbar>

    <!-- 2026-05-14: Fullscreen'de toolbar / tablo header çakışması çözümü.
         Toolbar ve scrollable content ayrı flex item'lara bölündü. Tablo
         başlıkları (day/studio sticky) yeni `.plan-shell-scroll` scroll
         context'ine yapışır; toolbar dışarıda flex 0 item olarak sabittir.
         Normal mod: wrapper sadece transparan in-flow div, layout aynı. -->
    <div class="plan-shell-scroll" #planShellScroll>
      <div class="print-title">
        <strong>STÜDYO PLANI</strong>
        <span>{{ dateRangeLabel() }}</span>
        <button class="fullscreen-inline-button no-print" type="button" (click)="toggleFullscreen()">
          <mat-icon>{{ fullscreenActive() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
        </button>
      </div>

      <app-studio-plan-table
        *ngIf="canEdit() && viewMode() !== 'list'"
        [days]="visibleDays()"
        [studios]="studios"
        [timeSlots]="timeSlots()"
        [cells]="cells()"
        [style.--slot-count]="timeSlots().length"
        (assignProgram)="onCellAssign($event)"
      ></app-studio-plan-table>

      <app-studio-plan-list
        *ngIf="!canEdit() || viewMode() === 'list'"
        [entries]="listEntries()"
      ></app-studio-plan-list>
    </div>
  </div>
</section>
