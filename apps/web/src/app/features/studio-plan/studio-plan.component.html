<section class="studio-plan-page">
  <header class="page-header">
    <div>
      <h1>Stüdyo Planı</h1>
      <p>{{ dateRangeLabel() }} · 06:00 - 02:00 · 30 dakikalık slotlar</p>
    </div>

    <div class="page-actions">
      <button mat-stroked-button type="button" (click)="toggleFullscreen()">
        <mat-icon>{{ fullscreenActive() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
        {{ fullscreenActive() ? 'Tam Ekrandan Çık' : 'Tam Ekran' }}
      </button>
      <button mat-flat-button color="primary" type="button" (click)="exportPlan()">
        <mat-icon>download</mat-icon>
        Export PDF
      </button>
    </div>
  </header>

  <app-studio-plan-toolbar
    [weekStart]="weekStart"
    [weekOptions]="weekOptions"
    [viewMode]="viewMode()"
    [programs]="programs()"
    [colors]="colors()"
    [selectedProgram]="selectedProgram"
    [selectedColor]="selectedColor"
    [readonly]="!canEdit()"
    [eraserMode]="eraserMode()"
    [loading]="loading()"
    [saving]="saving()"
    [saveError]="saveError()"
    [lastSavedAt]="lastSavedAt()"
    (weekStartChange)="onWeekStartChange($event)"
    (viewModeChange)="canEdit() && viewMode.set($event)"
    (selectedProgramChange)="selectedProgram = $event"
    (selectedColorChange)="selectedColor = $event"
    (clearSelection)="clearSelection()"
    (moveCurrentWeekToNextWeek)="moveCurrentWeekToNextWeek()"
    (eraserModeChange)="eraserMode.set($event)"
  ></app-studio-plan-toolbar>

  <div id="studio-plan-export" class="plan-shell">
    <div class="print-title">
      <strong>STÜDYO PLANI</strong>
      <span>{{ dateRangeLabel() }}</span>
      <button class="fullscreen-inline-button no-print" type="button" (click)="toggleFullscreen()">
        <mat-icon>{{ fullscreenActive() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
      </button>
    </div>

    <app-studio-plan-table
      *ngIf="canEdit() && viewMode() !== 'list'"
      [days]="visibleDays()"
      [studios]="studios"
      [timeSlots]="timeSlots"
      [cells]="cells()"
      [style.--slot-count]="timeSlots.length"
      (assignProgram)="onCellAssign($event)"
    ></app-studio-plan-table>

    <app-studio-plan-list
      *ngIf="!canEdit() || viewMode() === 'list'"
      [entries]="listEntries()"
    ></app-studio-plan-list>
  </div>
</section>
